<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estacionamento</title>
  </head>
  <body class="bg-green-200 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
      <div class="text-center mb-8">
      <span class="text-5xl">🔑</span>
      <h1 class="text-2x1 font-bold text-slate-800 mt-4">Controle de Acesso</h1>
      <p class="text-blue-600">Entre com suas credênciais</p>
      </div>
      <form id="login-form">
        <div>
          <label class="label-form">E-mail</label>
          <input type="email" id="email" required class="w-full mt-1 p-3 border border-slate-300 rounded-md focus:ring-4 outline-none" autofocus>
        </div>
        <div><!-- Senha-->
          <label class="label-form">Senha</label>
          <input type="password" id="password" required class="w-full mt-1 p-3 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-rounded-md mt-4">Acessar o sistema</button>
      </form>
      <!--menssagem-->
      <div id="message" class="mt-4 text-center text-sm text-red-500 hidden"></div>

    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
